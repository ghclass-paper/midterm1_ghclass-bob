on:
  push:
  # The schedule and manual trigger below are not part of the normal course
  # workflow; they are included only so this demo's uploaded artifacts do not
  # expire, since GitHub deletes artifacts 90 days after each run and public
  # repositories cannot raise that limit
  schedule:
    - cron: '0 12 1 */2 *'
  workflow_dispatch:
name: Check Assignment
jobs:
  check-allowed-files:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/dukestatsci/r_gh_actions:latest
    steps:
    - name: Checkout
      uses: actions/checkout@v7
    - name: Check Files
      run: |
        checklist::quit_on_failure({
          checklist::check_allowed_files(c("midterm1.qmd", "midterm1.Rproj", "README.md", "data/*"))
        })
      shell: Rscript {0}
  check-renders:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/dukestatsci/r_gh_actions:latest
    steps:
    - name: Checkout
      uses: actions/checkout@v7
    - name: Check Renders
      run: |
        checklist::check_qmd_renders("midterm1.qmd", install_missing = TRUE)
      shell: Rscript {0}
    - name: Create artifacts
      uses: actions/upload-artifact@v7
      with:
        name: midterm1-html
        path: midterm1.html
